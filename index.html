<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Retro Arcade Player</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; overflow: hidden; }
        #game { width: 100vw; height: 100vh; position: relative; }
        
        /* КНОПКА ВЫХОДА ПОВЕРХ ВСЕХ СЛОЕВ ЭМУЛЯТОРА */
        .exit-overlay-btn {
            position: absolute;
            top: 10px;
            left: 10px;
            z-index: 999999 !important; /* Максимальный приоритет, чтобы EmulatorJS её не перекрыл */
            background: rgba(34, 34, 34, 0.85);
            border: 2px solid #555;
            color: #ff0000; /* Выделим красным, чтобы сразу было видно */
            font-family: sans-serif;
            font-size: 11px;
            font-weight: bold;
            padding: 6px 12px;
            border-radius: 4px;
            cursor: pointer;
            box-shadow: 0 0 10px rgba(0,0,0,0.5);
            text-transform: uppercase;
        }
        .exit-overlay-btn:active {
            background: #ff0000;
            color: #fff;
        }
    </style>
</head>
<body>

    <button class="exit-overlay-btn" onclick="exitGame()">↩ В МЕНЮ</button>

    <div id="game"></div>

    <script>
        if (!('ontouchstart' in window)) { window.ontouchstart = function(){}; }
        if (!navigator.maxTouchPoints || navigator.maxTouchPoints === 0) {
            Object.defineProperty(navigator, 'maxTouchPoints', {get: function(){return 5;}});
        }

        try {
            const arcadeData = window.parent.SHARED_ROM_DATA;
            if (arcadeData && arcadeData.romArray) {
                EJS_player = '#game';
                EJS_core = arcadeData.core; 
                EJS_gameName = arcadeData.title;
                EJS_color = '#0064ff';
                EJS_pathtodata = 'https://cdn.emulatorjs.org/stable/data/';
                EJS_gameUrl = arcadeData.romArray; 
                EJS_startOnLoaded = true;
                EJS_Header = false; 
                EJS_mouse = false;
                EJS_Volume = arcadeData.volume;

                const script = document.createElement('script');
                script.src = "https://cdn.jsdelivr.net/gh/EmulatorJS/EmulatorJS@latest/data/loader.js";
                document.head.appendChild(script);
            }
        } catch(e) {
            console.log("Sandbox wait...");
        }

        // Функция отправки команды закрытия в index.html
        function exitGame() {
            window.parent.postMessage({ command: 'close_arcade' }, '*');
        }

        // Слушаем команды динамического изменения звука
        window.addEventListener('message', function(event) {
            if (event.data && typeof event.data.volume !== 'undefined') {
                if (typeof EJS_setVolume === 'function') {
                    EJS_setVolume(event.data.volume); 
                }
            }
        });
    </script>
</body>
</html>
