<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Akeys Retro Arcade</title>
    <!-- Подключаем Телеграм WebApp скрипт -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <!-- Подключаем бесплатный движок Денди -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jsnes/1.2.1/jsnes.min.js"></script>
    <style>
        body {
            background-color: #111;
            color: #fff;
            margin: 0;
            padding: 0;
            font-family: sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            height: 100vh;
            overflow: hidden;
            user-select: none;
        }
        #game-container {
            width: 100%;
            max-width: 400px;
            background: #000;
            position: relative;
        }
        canvas {
            width: 100%;
            display: block;
            image-rendering: pixelated;
        }
        /* Стили мобильного геймпада под экраны телефонов */
        #controls {
            display: grid;
            grid-template-columns: 1fr 1fr;
            width: 100%;
            max-width: 400px;
            flex-grow: 1;
            padding: 20px;
            box-sizing: border-box;
            background: #1a1a1a;
        }
        .dpad {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            grid-template-rows: repeat(3, 1fr);
            width: 150px;
            height: 150px;
            align-self: center;
        }
        .btn {
            background: #333;
            border: 2px solid #555;
            color: white;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 18px;
        }
        .btn:active { background: #555; }
        .action-buttons {
            display: flex;
            gap: 20px;
            justify-content: center;
            align-items: center;
        }
        .round-btn {
            width: 65px;
            height: 65px;
            background: #ff3b30;
            border-radius: 50%;
            border: 3px solid #fff;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 20px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }
        .round-btn:active { background: #b3261e; }
    </style>
</head>
<body>

    <h3 style="margin: 10px 0;">🕹️ AKEYS RETRO 🕹️</h3>
    
    <div id="game-container">
        <canvas id="nes-canvas" width="256" height="240"></canvas>
    </div>

    <!-- Кнопки управления на экране телефона -->
    <div id="controls">
        <div class="dpad">
            <div></div><div class="btn" id="up">▲</div><div></div>
            <div class="btn" id="left">◀</div><div></div><div class="btn" id="right">▶</div>
            <div></div><div class="btn" id="down">▼</div><div></div>
        </div>
        <div class="action-buttons">
            <div class="round-btn" id="btn-b">B</div>
            <div class="round-btn" id="btn-a">A</div>
        </div>
    </div>

    <script>
        // Инициализируем Telegram WebApp, чтобы кнопка закрытия была красивой
        window.Telegram.WebApp.ready();
        window.Telegram.WebApp.expand(); // Разворачиваем на весь экран

        var canvas = document.getElementById('nes-canvas');
        var ctx = canvas.getContext('2d');
        var nes = new jsnes.NES({
            onFrame: function(buffer) {
                var imageData = ctx.getImageData(0, 0, 256, 240);
                var data = imageData.data;
                for (var i = 0; i < buffer.length; i++) {
                    var pixel = buffer[i];
                    var r = (pixel >> 16) & 0xff;
                    var g = (pixel >> 8) & 0xff;
                    var b = pixel & 0xff;
                    var index = i * 4;
                    data[index] = r;
                    data[index+1] = g;
                    data[index+2] = b;
                    data[index+3] = 255;
                }
                ctx.putImageData(imageData, 0, 0);
            }
        });

        // Функция загрузки игры (ROM файла)
        function loadRom(url) {
            var req = new XMLHttpRequest();
            req.open("GET", url, true);
            req.overrideMimeType("text/plain; charset=x-user-defined");
            req.onload = function() {
                nes.loadROM(this.responseText);
                setInterval(nes.frame, 1000 / 60); // 60 FPS
            };
            req.send();
        }

        // Ссылаемся на файл игры. Положим его в ту же папку на GitHub
        loadRom("mario.nes"); 

        // Маппинг экранных кнопок на управление JSNES
        function bindKey(elementId, nesKey) {
            var el = document.getElementById(elementId);
            el.addEventListener('touchstart', function(e) { e.preventDefault(); nes.buttonDown(1, nesKey); });
            el.addEventListener('touchend', function(e) { e.preventDefault(); nes.buttonUp(1, nesKey); });
        }

        bindKey('up', jsnes.Controller.BUTTON_UP);
        bindKey('down', jsnes.Controller.BUTTON_DOWN);
        bindKey('left', jsnes.Controller.BUTTON_LEFT);
        bindKey('right', jsnes.Controller.BUTTON_RIGHT);
        bindKey('btn-a', jsnes.Controller.BUTTON_A);
        bindKey('btn-b', jsnes.Controller.BUTTON_B);
    </script>
</body>
</html>
