<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>9999 IN 1 - Ultimate Retro Arcade</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jsnes/1.2.1/jsnes.min.js"></script>
    <script src="games.js"></script>

    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        body, html {
            background-color: #000; color: #fff; margin: 0; padding: 0;
            font-family: 'Press Start 2P', monospace;
            height: 100vh; overflow: hidden; user-select: none;
        }
        body {
            display: flex; flex-direction: column; align-items: center; justify-content: flex-start;
        }
        .header-panel {
            display: flex; width: 100%; max-width: 400px; justify-content: space-between; align-items: center;
            padding: 8px 15px; box-sizing: border-box; background: #000; border-bottom: 2px solid #333; 
            position: relative; z-index: 10000;
        }
        .head-btn {
            background: #222; border: 2px solid #555; color: #fff;
            font-family: 'Press Start 2P', monospace; font-size: 8px; padding: 6px 10px; cursor: pointer;
        }
        #sound-toggle.muted { color: #ffaa00; border-color: #663333; }
        #back-to-catalog { display: none; background: #224; border-color: #448; }

        /* ОБЩИЙ КОНТЕЙНЕР ДЛЯ ВСЕХ ВКЛАДОК С ВИДЕО-ФОНОМ */
        #catalog-container {
            width: 100%; max-width: 400px; flex-grow: 1; overflow-y: auto; position: relative;
            background-color: #000; padding-top: 25px; padding-bottom: 70px; box-sizing: border-box;
            z-index: 10; display: flex; flex-direction: column; align-items: center;
        }
        .bg-video {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            object-fit: cover; z-index: 1; pointer-events: none;
        }
        
        /* СЛОИ ДЛЯ КОРРЕКТНОГО ПЕРЕКЛЮЧЕНИЯ СЕКЦИЙ */
        .app-section { width: 100%; z-index: 5; position: relative; display: none; }
        #section-games { display: block; }

        .menu-title { font-size: 20px; color: #ffff00; text-shadow: 3px 3px #000; margin-bottom: 25px; text-align: center; letter-spacing: 2px; }
        .game-list { width: 100%; padding: 0 25px; box-sizing: border-box; }
        
        /* 🔥 ОБНОВЛЕННЫЙ СТИЛЬ КАРТОЧКИ С ПЛАТФОРМОЙ */
        .retro-item { 
            font-size: 10px; color: #fff; text-shadow: 2px 2px #000; padding: 12px 0; 
            cursor: pointer; display: flex; align-items: center; text-transform: uppercase;
            border-bottom: 1px solid #111; justify-content: space-between;
        }
        .retro-item:active { color: #ffff00; }
        .game-title-text { display: flex; align-items: center; }
        .game-title-text::before { content: "▶ "; opacity: 0; margin-right: 8px; color: #ffff00; }
        .retro-item:active .game-title-text::before { opacity: 1; }
        .item-system-badge { font-size: 7px; padding: 3px 6px; background: #333; border-radius: 2px; color: #fff; margin-left: 10px; font-family: sans-serif; font-weight: bold; }
        .badge-nes { background: #b91c1c; }
        .badge-sega { background: #1e3a8a; }
        .badge-snes { background: #4c1d95; } /* Фиолетовый бейдж для SNES */

        /* 🔥 СТИЛИ ДЛЯ КНОПОК ПАГИНАЦИИ */
        .pagination-container {
            display: flex; justify-content: space-between; align-items: center;
            width: 100%; padding: 20px 25px 10px 25px; box-sizing: border-box;
            z-index: 15; position: relative; gap: 10px;
        }
        .page-btn {
            background: #222; border: 2px solid #555; color: #fff;
            font-family: 'Press Start 2P', monospace; font-size: 8px; padding: 8px 12px;
            cursor: pointer; border-radius: 4px;
        }
        .page-btn:active:not(:disabled) { background: #444; color: #ffff00; }
        .page-btn:disabled { background: #111; border-color: #333; color: #444; cursor: not-allowed; }
        .page-info-text { font-size: 7px; color: #888; text-align: center; }

        /* СТИЛИ ДЛЯ СЕКЦИИ СЕКРЕТОВ */
        .secret-card { background: rgba(17, 17, 17, 0.9); border: 2px solid #444; margin: 0 20px 15px 20px; padding: 15px; border-radius: 4px; }
        .secret-game { font-size: 10px; color: #ffff00; margin-bottom: 6px; }
        .secret-title { font-size: 8px; color: #00ff00; margin-bottom: 10px; line-height: 1.4; }
        .secret-code { font-size: 8px; color: #fff; line-height: 1.6; background: #000; padding: 8px; border: 1px dashed #555; word-wrap: break-word; user-select: text; }

        /* СТИЛИ ДЛЯ ФОРМЫ ЗАКАЗА */
        .order-container { padding: 0 25px; box-sizing: border-box; width: 100%; }
        .order-text { font-size: 8px; line-height: 1.6; color: #aaa; margin-bottom: 20px; text-align: center; }
        .form-group { display: flex; flex-direction: column; gap: 8px; margin-bottom: 15px; }
        .form-label { font-size: 8px; color: #ffff00; }
        .form-input { 
            background: #111; border: 2px solid #555; padding: 10px; color: #fff; 
            font-family: 'Press Start 2P', monospace; font-size: 9px; border-radius: 4px;
        }
        .form-input:focus { border-color: #00ff00; outline: none; }
        .order-submit-btn {
            width: 100%; background: #0064ff; border: 3px solid #0040aa; color: #fff;
            font-family: 'Press Start 2P', monospace; font-size: 10px; padding: 12px;
            cursor: pointer; border-radius: 4px; box-shadow: 0 4px 0 #002266; margin-top: 10px;
        }
        .order-submit-btn:active { transform: translateY(4px); box-shadow: none; }

        /* НИЖНИЙ ТАБ-БАР (МЕНЮ ВКЛАДОК) */
        .tab-bar {
            position: absolute; bottom: 0; left: 0; right: 0; height: 55px;
            background: #111; border-top: 3px solid #333; display: flex;
            justify-content: space-around; align-items: center; z-index: 100; box-sizing: border-box;
        }
        .tab-item {
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            flex-grow: 1; height: 100%; color: #888; cursor: pointer; background: none; border: none;
            font-family: 'Press Start 2P', monospace; font-size: 7px; gap: 6px;
        }
        .tab-item.active { color: #ffff00; background: #1a1a1a; }
        .tab-icon { font-size: 14px; }

        /* ЭКРАН ИГРЫ */
        #game-screen { display: none; width: 100%; max-width: 400px; flex-grow: 1; background: #000; position: relative; z-index: 20; height: 100vh; }
        
        #game-container { 
            width: 100%; flex-grow: 1; max-height: calc(100vh - 250px); background: #000; 
            position: relative; display: flex; justify-content: center; align-items: center; overflow: hidden; padding-top: 15px; box-sizing: border-box;
        }
        #nes-canvas { width: 100%; max-height: 100%; object-fit: contain; display: block; image-rendering: pixelated; }

        #sega-display-container { display: none; width: 100%; max-width: 400px; height: calc(100vh - 44px); position: absolute; top: 44px; left: 0; z-index: 999; background: #000; }
        #sega-display-container iframe { width: 100%; height: 100%; border: none; display: block; }

        /* ГЕЙМПАД ДЛЯ NES */
        #gamepad { position: absolute; bottom: 0; left: 0; right: 0; z-index: 30; display: flex; flex-direction: column; width: 100%; padding: 15px; box-sizing: border-box; justify-content: space-between; border-top: 4px solid #222; background: #111; }
        .main-controls { display: flex; width: 100%; justify-content: space-between; align-items: center; }
        .dpad { display: grid; grid-template-columns: repeat(3, 1fr); grid-template-rows: repeat(3, 1fr); width: 130px; height: 130px; }
        .btn { background: #222; border: 3px solid #444; color: white; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 14px; }
        .btn:active { background: #444; }
        #nes-buttons { display: inline-flex; gap: 15px; }
        .round-btn { width: 60px; height: 60px; background: #cc1111; border-radius: 50%; border: 4px solid #fff; color: white; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 16px; font-family: sans-serif; box-shadow: 0 4px 0 #880000; }
        .round-btn:active { background: #aa0000; transform: translateY(4px); box-shadow: none; }
        .system-buttons { display: flex; flex-direction: column; gap: 10px; width: 100%; margin-top: 15px; }
        .sys-row { display: flex; justify-content: center; gap: 20px; }
        .sys-btn { background: #333; border: 2px solid #555; color: #aaa; width: 80px; height: 22px; border-radius: 4px; font-size: 8px; display: flex; align-items: center; justify-content: center; }
        .sys-btn:active { background: #111; color: #fff; }
        .save-btn { background: #1e3d1e; border-color: #387338; color: #8fdf8f; }
        .load-btn { background: #1e2e3d; border-color: #385973; color: #8fbadf; }
    </style>
</head>
<body>

    <div class="header-panel">
        <button id="back-to-catalog" class="head-btn">↩ МЕНЮ</button>
        <div id="main-title" style="font-size: 8px; letter-spacing: 1px;">9999 IN 1</div>
        <button id="sound-toggle" class="head-btn muted">🔇 ЗВУК</button>
    </div>
    
    <div id="catalog-container">
        <video id="menu-bg-video" class="bg-video" loop playsinline webkit-playsinline>
            <source src="background-video.mp4" type="video/mp4">
        </video>

        <div id="section-games" class="app-section">
            <div class="menu-title">9999 IN 1</div>
            <div class="game-list" id="retro-game-list"></div>
            <div class="pagination-container" id="pagination-controls"></div>
        </div>

        <div id="section-secrets" class="app-section">
            <div class="menu-title">СЕКРЕТЫ</div>
            
            <div style="padding: 0 20px 15px 20px;">
                <input type="text" id="search-secrets-input" class="form-input" style="width: 100%; box-sizing: border-box;" placeholder="ПОИСК ИГРЫ ИЛИ ЧИТА..." oninput="filterSecrets()">
            </div>

            <div id="secrets-container"></div>
        </div>

        <div id="section-order" class="app-section">
            <div class="menu-title">ЗАКАЗ ИГР</div>
            <div class="order-container">
                <div class="order-text">ЗАКАЗ НОВОЙ ИГРЫ ПЛАТНЫЙ (100 РУБЛЕЙ). НАПИШИТЕ НАЗВАНИЕ, И МЫ ДОБАВИМ ЕЁ НА ПОЛКУ БОТА!</div>
                
                <div class="form-group">
                    <label class="form-label">НАЗВАНИЕ ИГРЫ:</label>
                    <input type="text" id="order-game-title" class="form-input" placeholder="НАПРИМЕР: TEENAGE MUTANT TURTLES">
                </div>

                <div class="form-group">
                    <label class="form-label">ПЛАТФОРМА (КОНСОЛЬ):</label>
                    <input type="text" id="order-game-system" class="form-input" placeholder="DENDY / SEGA / GBA">
                </div>

                <button id="order-btn-submit" class="order-submit-btn" onclick="sendOrderRequest()">ОТПРАВИТЬ ЗАЯВКУ</button>
            </div>
        </div>

        <div class="tab-bar" id="app-tab-bar">
            <button class="tab-item active" onclick="switchTab('games', this)">
                <span class="tab-icon">🎮</span><span>ИГРЫ</span>
            </button>
            <button class="tab-item" onclick="switchTab('secrets', this)">
                <span class="tab-icon">🔑</span><span>СЕКРЕТЫ</span>
            </button>
            <button class="tab-item" onclick="switchTab('order', this)">
                <span class="tab-icon">📥</span><span>ЗАКАЗ</span>
            </button>
        </div>
    </div>

    <div id="game-screen">
        <div id="game-container">
            <canvas id="nes-canvas" width="256" height="240"></canvas>
        </div>
        <div id="sega-display-container"></div>
        <div id="gamepad">
            <div class="main-controls">
                <div class="dpad">
                    <div></div><div class="btn" id="up">▲</div><div></div>
                    <div class="btn" id="left">◀</div><div></div><div class="btn" id="right">▶</div>
                    <div></div><div class="btn" id="down">▼</div><div></div>
                </div>
                <div id="nes-buttons">
                    <div class="round-btn" id="btn-b">B</div>
                    <div class="round-btn" id="btn-a">A</div>
                </div>
            </div>
            <div class="system-buttons">
                <div class="sys-row">
                    <div class="sys-btn" id="btn-select">SELECT</div><div class="sys-btn" id="btn-start">START</div>
                </div>
                <div class="sys-row">
                    <div class="sys-btn save-btn" id="btn-save">SAVE</div><div class="sys-btn load-btn" id="btn-load">LOAD</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        window.Telegram.WebApp.ready();
        window.Telegram.WebApp.expand();

        var gasRetroUrl = "https://script.google.com/macros/s/AKfycbwBjulaVnjKN-Af3oDFFFaG4Us8n6Jgcz3BTJRL1HThFxlgMuxv_D4x1yK4Khy-BsVL/exec";

        // 🔥 ПЕРЕМЕННЫЕ УМНОЙ ПАГИНАЦИИ И АЛФАВИТНОЙ СОРТИРОВКИ
        var sortedGames = [];      
        var currentPage = 1;     
        var itemsPerPage = 5; // По сколько игр выводить на один экран (можешь поставить 7, 10 или сколько влезет в высоту)

        // 🔥 ПЕРЕМЕННЫЕ ДЛЯ ХРАНЕНИЯ И ФИЛЬТРАЦИИ СЕКРЕТОВ
        var allSecrets = [];

        // 🔥 1. СОРТИРОВКА ПО АЛФАВИТУ И ИНИЦИАЛИЗАЦИЯ СПИСКА
        var rawGamesList = window.MY_GAMES || [];
        if (rawGamesList.length > 0) {
            sortedGames = rawGamesList.sort(function(a, b) {
                var titleA = a.title.toString().toLowerCase().trim();
                var titleB = b.title.toString().toLowerCase().trim();
                return titleA.localeCompare(titleB, 'ru', { sensitivity: 'base' });
            });
            renderGamesPage(currentPage);
        }

        // 🔥 2. ФУНКЦИЯ ОТРИСОВКИ КОНКРЕТНОЙ СТРАНИЦЫ
        // 🔥 ОБНОВЛЕННАЯ ОТРИСОВКА БЕЙДЖЕЙ ДЛЯ ТРЁХ ПЛАТФОРМ
        function renderGamesPage(page) {
            var listContainer = document.getElementById('retro-game-list');
            if (!listContainer) return;

            listContainer.innerHTML = "";

            var startIndex = (page - 1) * itemsPerPage;
            var endIndex = startIndex + itemsPerPage;
            var pageItems = sortedGames.slice(startIndex, endIndex);

            pageItems.forEach(function(game, index) {
                var globalIndex = startIndex + index + 1;
                var num = globalIndex.toString().padStart(4, '0'); 
                
                var item = document.createElement('div');
                item.className = 'retro-item';
                
                // Умное распределение бейджей
                var badgeClass = 'badge-nes';
                var sysLabel = 'NES';
                
                if (game.system === 'sega') {
                    badgeClass = 'badge-sega';
                    sysLabel = 'SEGA';
                } else if (game.system === 'snes') {
                    badgeClass = 'badge-snes';
                    sysLabel = 'SNES';
                }

                item.innerHTML = `
                    <div class="game-title-text">${num}. ${game.title}</div>
                    <span class="item-system-badge ${badgeClass}">${sysLabel}</span>
                `;

                item.addEventListener('click', function() {
                    startGame(game.file, game.title, game.system);
                });
                listContainer.appendChild(item);
            });

            renderPaginationButtons();
        }

        // 🔥 3. ГЕНЕРАЦИЯ КНОПОК НАВИГАЦИИ (НАЗАД / ВПЕРЕД)
        function renderPaginationButtons() {
            var controlsContainer = document.getElementById('pagination-controls');
            if (!controlsContainer) return;

            controlsContainer.innerHTML = "";
            var totalPages = Math.ceil(sortedGames.length / itemsPerPage);
            if (totalPages <= 1) return;

            var prevDisabled = (currentPage === 1) ? "disabled" : "";
            var prevBtn = document.createElement('button');
            prevBtn.className = 'page-btn';
            prevBtn.disabled = (currentPage === 1);
            prevBtn.textContent = "◀ НАЗАД";
            prevBtn.addEventListener('click', function() { changeGamesPage(currentPage - 1); });

            var infoSpan = document.createElement('span');
            infoSpan.className = 'page-info-text';
            infoSpan.innerHTML = `PAGE<br>${currentPage}/${totalPages}`;

            var nextBtn = document.createElement('button');
            nextBtn.className = 'page-btn';
            nextBtn.disabled = (currentPage === totalPages);
            nextBtn.textContent = "ВПЕРЕД ▶";
            nextBtn.addEventListener('click', function() { changeGamesPage(currentPage + 1); });

            controlsContainer.appendChild(prevBtn);
            controlsContainer.appendChild(infoSpan);
            controlsContainer.appendChild(nextBtn);
        }

        // 🔥 4. ПЕРЕКЛЮЧЕНИЕ СТРАНИЦЫ И СКРОЛЛ НАВЕРХ ВНУТРИ КАТАЛОГА
        function changeGamesPage(newPage) {
            currentPage = newPage;
            renderGamesPage(currentPage);
            
            // Скроллим строго контейнер каталога наверх, чтобы фон не улетал
            var catalog = document.getElementById('catalog-container');
            if (catalog) catalog.scrollTop = 0;

            if (window.Telegram && window.Telegram.WebApp && window.Telegram.WebApp.HapticFeedback) {
                window.Telegram.WebApp.HapticFeedback.impactOccurred('light');
            }
        }

        // 2. АВТОМАТИЧЕСКАЯ ПОДГРУЗКА СЕКРЕТОВ ИЗ ТАБЛИЦЫ ЧЕРЕЗ JSONP
        (function loadRetroSecrets() {
            var script = document.createElement('script');
            script.src = gasRetroUrl + "?action=get_secrets&callback=renderSecrets";
            document.head.appendChild(script);
        })();

        // 🔥 ХРАНИМ И ОТРИСОВЫВАЕМ СЕКРЕТЫ С ПОДДЕРЖКОЙ ФИЛЬТРАЦИИ
        function renderSecrets(data) {
            allSecrets = data || []; // Сохраняем полученные данные в глобальный кэш
            displaySecretsList(allSecrets); // Передаем на отрисовку
        }

        // Вспомогательная функция для чистой отрисовки карточек читов
        function displaySecretsList(secretsArray) {
            var secretsContainer = document.getElementById('secrets-container');
            if (!secretsContainer) return;
            
            secretsContainer.innerHTML = "";
            
            if (secretsArray.length === 0) {
                secretsContainer.innerHTML = '<div style="text-align:center; font-size:8px; color:#555; padding-top:20px;">НИЧЕГО НЕ НАЙДЕНО</div>';
                return;
            }

            secretsArray.forEach(function(item) {
                var card = document.createElement('div');
                card.className = 'secret-card';
                card.innerHTML = `
                    <div class="secret-game">[${item.type}] ${item.game}</div>
                    <div class="secret-title">${item.title}</div>
                    <div class="secret-code">${item.code}</div>
                `;
                secretsContainer.appendChild(card);
            });
        }

        // 🔥 ФУНКЦИЯ ДИНАМИЧЕСКОГО РЕАКТИВНОГО ПОИСКА СЕКРЕТОВ
        function filterSecrets() {
            var query = document.getElementById('search-secrets-input').value.toLowerCase().trim();
            
            // Если поле поиска очищено — выводим всю базу
            if (!query) {
                displaySecretsList(allSecrets);
                return;
            }

            // Фильтруем кэш по названию игры, типу платформы или тексту чита
            var filtered = allSecrets.filter(function(item) {
                var gameMatch = item.game.toLowerCase().includes(query);
                var titleMatch = item.title.toLowerCase().includes(query);
                var typeMatch = item.type.toLowerCase().includes(query);
                return gameMatch || titleMatch || typeMatch;
            });

            displaySecretsList(filtered);
        }

        // 3. ОТПРАВКА ЗАКАЗА НА НОВОГО БОТА
        function sendOrderRequest() {
            var titleInput = document.getElementById('order-game-title').value.trim();
            var systemInput = document.getElementById('order-game-system').value.trim();

            if (!titleInput) { alert("ВВЕДИТЕ НАЗВАНИЕ ИГРЫ!"); return; }

            var initData = window.Telegram.WebApp.initDataUnsafe;
            var userId = initData.user ? initData.user.id : "";
            var username = initData.user ? initData.user.username : "no_name";

            if (!userId) { alert("ОШИБКА TELEGRAM ID!"); return; }

            var btnSubmit = document.getElementById('order-btn-submit');
            btnSubmit.disabled = true;
            btnSubmit.textContent = "ОТПРАВКА...";

            var requestUrl = gasRetroUrl + "?action=submit_order&title=" + encodeURIComponent(titleInput) + 
                             "&system=" + encodeURIComponent(systemInput || "Dendy") + 
                             "&user_id=" + userId + 
                             "&username=" + encodeURIComponent(username);

            fetch(requestUrl, { mode: 'no-cors' })
                .then(function() {
                    window.Telegram.WebApp.showPopup({
                        title: "ЗАЯВКА СФОРМИРОВАНА!",
                        message: "Счет отправлен в диалог с ботом. Если что-то пошло не так или возникли трудности при отправке — напишите админу напрямую!",
                        buttons: [
                            { id: "bot", type: "default", text: "🤖 К БОТУ ЗА СЧЕТОМ" },
                            { id: "admin", type: "default", text: "👨‍💻 НАПИСАТЬ АДМИНУ" },
                            { id: "close", type: "cancel", text: "ЗАКРЫТЬ" }
                        ]
                    }, function(buttonId) {
                        if (buttonId === "bot") {
                            window.Telegram.WebApp.openTelegramLink("https://t.me/gameMAN888_bot");
                        } else if (buttonId === "admin") {
                            window.Telegram.WebApp.openTelegramLink("https://t.me/Den888ak");
                        }
                        window.Telegram.WebApp.close(); 
                    });
                })
                .catch(function() {
                    alert("ОШИБКА СВЯЗИ С СЕРВЕРОМ!");
                    btnSubmit.disabled = false;
                    btnSubmit.textContent = "ОТПРАВИТЬ ЗАЯВКУ";
                });
        }

        function switchTab(tabId, buttonElement) {
            var sections = document.getElementsByClassName('app-section');
            for(var i=0; i<sections.length; i++) { sections[i].style.display = 'none'; }
            
            var tabs = document.getElementsByClassName('tab-item');
            for(var i=0; i<tabs.length; i++) { tabs[i].classList.remove('active'); }

            document.getElementById('section-' + tabId).style.display = 'block';
            buttonElement.classList.add('active');

            if (window.Telegram && window.Telegram.WebApp && window.Telegram.WebApp.HapticFeedback) {
                window.Telegram.WebApp.HapticFeedback.impactOccurred('light');
            }
        }

        var canvas = document.getElementById('nes-canvas');
        var ctx = canvas.getContext('2d');
        var audioCtx = null;
        var audioEnabled = false;
        var bufferSize = 4096;
        var audioBuffer = new Float32Array(bufferSize);
        var audioBufferIndex = 0;
        var gameLoopInterval = null;
        var currentRomName = ""; 
        var currentSystem = "nes";
        var videoEl = document.getElementById('menu-bg-video');

        if(videoEl) {
            videoEl.muted = true;
            videoEl.play().catch(function(e){});
        }

        var nes = new jsnes.NES({
            onFrame: function(buffer) {
                var imageData = ctx.getImageData(0, 0, 256, 240);
                var data = imageData.data;
                for (var i = 0; i < buffer.length; i++) {
                    var pixel = buffer[i];
                    var index = i * 4;
                    data[index] = pixel & 0xff; 
                    data[index+1] = (pixel >> 8) & 0xff;
                    data[index+2] = (pixel >> 16) & 0xff;
                    data[index+3] = 255;
                }
                ctx.putImageData(imageData, 0, 0);
            },
            onAudioSample: function(left, right) {
                if (!audioEnabled) return;
                if (audioBufferIndex < bufferSize) {
                    audioBuffer[audioBufferIndex++] = left;
                }
            }
        });

        function initAudio() {
            if (audioCtx) return;
            var AudioContext = window.AudioContext || window.webkitAudioContext;
            audioCtx = new AudioContext({ sampleRate: 44100 });
            var scriptProcessor = audioCtx.createScriptProcessor(bufferSize, 0, 1);
            scriptProcessor.onaudioprocess = function(e) {
                var output = e.outputBuffer.getChannelData(0);
                for (var i = 0; i < bufferSize; i++) {
                    output[i] = audioEnabled ? audioBuffer[i] : 0;
                }
                audioBuffer.fill(0);
                audioBufferIndex = 0;
            };
            scriptProcessor.connect(audioCtx.destination);
        }

        var soundBtn = document.getElementById('sound-toggle');
        if (soundBtn) {
            soundBtn.addEventListener('click', function() {
                initAudio();
                if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
                audioEnabled = !audioEnabled;
                this.textContent = audioEnabled ? "🔊 ЗВУК: ВКЛ" : "🔇 ЗВУК";
                if(videoEl) videoEl.muted = !audioEnabled;
                if(audioEnabled) this.classList.remove('muted'); else this.classList.add('muted');

                if (currentSystem === "sega" || currentSystem === "snes") {
                    var iframe = document.getElementById('active-emulator-iframe');
                    if (iframe && iframe.contentWindow) {
                        iframe.contentWindow.postMessage({ volume: audioEnabled ? 1 : 0 }, '*');
                    }
                }
            });
        }

        function launchIsolatedEmulatorJS(romUrl, systemType, gameTitle) {
            var container = document.getElementById('sega-display-container');
            container.innerHTML = ""; 

            var coreType = (systemType === "sega") ? "segaMD" : "snes";
            var absoluteRomUrl = window.location.origin + window.location.pathname.replace("index.html", "") + romUrl;
            var initialVolume = audioEnabled ? 1 : 0;

            var iframeHtml = `
            <!DOCTYPE html>
            <html>
            <head>
                <meta charset="UTF-8">
                <style>
                    body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; overflow: hidden; }
                    #game { width: 100%; height: 100%; }
                </style>
                <script>
                    if (!('ontouchstart' in window)) { window.ontouchstart = function(){}; }
                    if (!navigator.maxTouchPoints || navigator.maxTouchPoints === 0) {
                        Object.defineProperty(navigator, 'maxTouchPoints', {get: function(){return 5;}});
                    }
                <\/script>
            </head>
            <body>
                <div id="game"></div>
                <script>
                    EJS_player = "#game";
                    EJS_core = "${coreType}";
                    EJS_gameName = "${gameTitle}";
                    EJS_color = "#0064ff";
                    EJS_pathtodata = "https://cdn.emulatorjs.org/stable/data/";
                    EJS_gameUrl = "${absoluteRomUrl}";
                    EJS_startOnLoaded = true;
                    EJS_Volume = ${initialVolume};
                    EJS_Header = false;
                    EJS_mouse = false;
                <\/script>
                <script src="https://cdn.emulatorjs.org/stable/data/loader.js"><\/script>
                <script>
                    window.addEventListener('message', function(e) {
                        if (e.data && typeof e.data.volume !== 'undefined') {
                            if (typeof EJS_setVolume === 'function') { EJS_setVolume(e.data.volume); }
                        }
                    });
                <\/script>
            </body>
            </html>
            `;

            var iframe = document.createElement('iframe');
            iframe.id = "active-emulator-iframe";
            iframe.srcdoc = iframeHtml;
            container.appendChild(iframe);
        }

        function startGame(romUrl, gameTitle, system) {
            currentRomName = romUrl;
            currentSystem = system || "nes";
            
            if(videoEl) videoEl.pause();

            document.getElementById('catalog-container').style.display = 'none';
            document.getElementById('app-tab-bar').style.display = 'none';
            document.getElementById('game-screen').style.display = 'flex';
            document.getElementById('back-to-catalog').style.display = 'block';
            document.getElementById('main-title').textContent = gameTitle;

            if (currentSystem === "sega" || currentSystem === "snes") {
                document.getElementById('game-container').style.display = 'none';
                document.getElementById('gamepad').style.display = 'none'; 
                document.getElementById('sega-display-container').style.display = 'block';
                launchIsolatedEmulatorJS(romUrl, currentSystem, gameTitle);
            } else {
                document.getElementById('game-container').style.display = 'flex';
                document.getElementById('gamepad').style.display = 'flex';
                document.getElementById('sega-display-container').style.display = 'none';
                
                var req = new XMLHttpRequest();
                req.open("GET", romUrl, true);
                req.overrideMimeType("text/plain; charset=x-user-defined");
                req.onload = function() {
                    if (req.status === 200) {
                        nes.loadROM(this.responseText);
                        if(gameLoopInterval) clearInterval(gameLoopInterval);
                        gameLoopInterval = setInterval(nes.frame, 1000 / 60);
                    } else {
                        alert("ОШИБКА ЗАГРУЗКИ РОМА!");
                        exitToCatalog();
                    }
                };
                req.send();
            }
            
            if (window.Telegram && window.Telegram.WebApp && window.Telegram.WebApp.HapticFeedback) {
                window.Telegram.WebApp.HapticFeedback.impactOccurred('medium');
            }
        }

        function exitToCatalog() {
            if(gameLoopInterval) clearInterval(gameLoopInterval);
            
            if(videoEl) videoEl.play().catch(function(e){});

            if(currentSystem === "sega" || currentSystem === "snes") {
                var container = document.getElementById('sega-display-container');
                var iframe = document.getElementById('active-emulator-iframe');
                if(iframe) {
                    iframe.src = "about:blank"; 
                    iframe.remove();
                }
                container.innerHTML = ""; 
                container.style.display = "none";
            }

            document.getElementById('game-screen').style.display = 'none';
            document.getElementById('back-to-catalog').style.display = 'none';
            document.getElementById('catalog-container').style.display = 'flex';
            document.getElementById('app-tab-bar').style.display = 'flex';
            document.getElementById('main-title').textContent = '9999 IN 1';
        }
        
        document.getElementById('back-to-catalog').addEventListener('click', exitToCatalog);

        function bindKey(elementId, nesKey) {
            var el = document.getElementById(elementId);
            if(el) {
                el.addEventListener('touchstart', function(e) { e.preventDefault(); if(currentSystem === "nes") nes.buttonDown(1, nesKey); });
                el.addEventListener('touchend', function(e) { e.preventDefault(); if(currentSystem === "nes") nes.buttonUp(1, nesKey); });
                el.addEventListener('mousedown', function(e) { if(currentSystem === "nes") nes.buttonDown(1, nesKey); });
                el.addEventListener('mouseup', function(e) { if(currentSystem === "nes") nes.buttonUp(1, nesKey); });
            }
        }
        bindKey('up', jsnes.Controller.BUTTON_UP); bindKey('down', jsnes.Controller.BUTTON_DOWN);
        bindKey('left', jsnes.Controller.BUTTON_LEFT); bindKey('right', jsnes.Controller.BUTTON_RIGHT);
        bindKey('btn-a', jsnes.Controller.BUTTON_A); bindKey('btn-b', jsnes.Controller.BUTTON_B);
        bindKey('btn-start', jsnes.Controller.BUTTON_START); bindKey('btn-select', jsnes.Controller.BUTTON_SELECT);

        document.getElementById('btn-save').addEventListener('click', function() {
            if (currentSystem === "nes" && currentRomName) {
                localStorage.setItem("save_" + currentRomName, JSON.stringify(nes.toJSON()));
                alert("ИГРА NES СОХРАНЕНА!");
            }
        });

        document.getElementById('btn-load').addEventListener('click', function() {
            if (currentSystem === "nes" && currentRomName) {
                var data = localStorage.getItem("save_" + currentRomName);
                if (data) { nes.fromJSON(JSON.parse(data)); alert("ЗАГРУЗКА УСПЕШНА!"); }
                else { alert("НЕТ СОХРАНЕНИЙ"); }
            }
        });
    </script>
</body>
</html>
