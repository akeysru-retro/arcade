<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>9999 IN 1 - Akeys Arcade</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jsnes/1.2.1/jsnes.min.js"></script>
    
    <!-- 🔥 ПОДКЛЮЧАЕМ НАШ ВНЕШНИЙ СПИСОК ИГР -->
    <script src="games.js"></script>

    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        body {
            background-color: #000;
            color: #fff;
            margin: 0;
            padding: 0;
            font-family: 'Press Start 2P', monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            height: 100vh;
            overflow: hidden;
            user-select: none;
        }
        
        .header-panel {
            display: flex;
            width: 100%;
            max-width: 400px;
            justify-content: space-between;
            align-items: center;
            padding: 8px 15px;
            box-sizing: border-box;
            background: #000;
            border-bottom: 2px solid #333;
            z-index: 10;
        }
        
        .head-btn {
            background: #222;
            border: 2px solid #555;
            color: #fff;
            font-family: 'Press Start 2P', monospace;
            font-size: 8px;
            padding: 6px 10px;
            cursor: pointer;
        }
        #sound-toggle.muted { color: #ffaa00; border-color: #663333; }
        #back-to-catalog { display: none; background: #224; border-color: #448; }

        #catalog-container {
            width: 100%;
            max-width: 400px;
            flex-grow: 1;
            overflow-y: auto;
            position: relative;
            background-color: #1a5276;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-top: 25px;
            box-sizing: border-box;
        }

        /* Сюда мы и воткнем твою гифку, как только ты её пришлешь */
        .retro-background-svg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            pointer-events: none;
        }

        .menu-title {
            font-size: 20px;
            color: #ffff00;
            text-shadow: 3px 3px #000;
            margin-bottom: 25px;
            text-align: center;
            letter-spacing: 2px;
            z-index: 5;
        }

        .game-list {
            width: 100%;
            padding: 0 25px;
            box-sizing: border-box;
            z-index: 5;
            position: relative;
        }

        .retro-item {
            font-size: 11px;
            color: #fff;
            text-shadow: 2px 2px #000;
            padding: 12px 0;
            cursor: pointer;
            display: flex;
            align-items: center;
            text-transform: uppercase;
        }
        .retro-item:active { color: #ffff00; }
        .retro-item::before { content: "▶ "; opacity: 0; margin-right: 8px; color: #ffff00; }
        .retro-item:active::before { opacity: 1; }

        /* ЭКРАН ИГРЫ И ГЕЙМПАД */
        #game-screen { display: none; width: 100%; flex-direction: column; align-items: center; flex-grow: 1; background: #000; }
        #game-container { width: 100%; max-width: 400px; background: #000; }
        canvas { width: 100%; display: block; image-rendering: pixelated; }
        
        #gamepad {
            display: flex;
            flex-direction: column;
            width: 100%;
            max-width: 400px;
            flex-grow: 1;
            background: #111;
            padding: 15px;
            box-sizing: border-box;
            justify-content: space-between;
            border-top: 4px solid #222;
        }
        .main-controls { display: table; width: 100%; }
        .dpad-cell, .action-cell { display: table-cell; width: 50%; vertical-align: middle; }
        .action-cell { text-align: right; }
        .dpad { display: grid; grid-template-columns: repeat(3, 1fr); grid-template-rows: repeat(3, 1fr); width: 135px; height: 135px; margin: 0 auto; }
        .btn { background: #222; border: 3px solid #444; color: white; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 14px; }
        .btn:active { background: #444; }
        .action-buttons { display: inline-flex; gap: 15px; }
        .round-btn { width: 60px; height: 60px; background: #cc1111; border-radius: 50%; border: 4px solid #fff; color: white; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 16px; font-family: sans-serif; box-shadow: 0 4px 0 #880000; }
        .round-btn:active { background: #aa0000; transform: translateY(4px); box-shadow: none; }
        
        .system-buttons { display: flex; flex-direction: column; gap: 10px; width: 100%; }
        .sys-row { display: flex; justify-content: center; gap: 20px; }
        .sys-btn { background: #333; border: 2px solid #555; color: #aaa; width: 80px; height: 22px; border-radius: 4px; font-size: 8px; display: flex; align-items: center; justify-content: center; }
        .sys-btn:active { background: #111; color: #fff; }
        .save-btn { background: #1e3d1e; border-color: #387338; color: #8fdf8f; }
        .load-btn { background: #1e2e3d; border-color: #385973; color: #8fbadf; }
    </style>
</head>
<body>

    <div class="header-panel">
        <button id="back-to-catalog" class="head-btn">↩ МЕНЮ</button>
        <div id="main-title" style="font-size: 8px; letter-spacing: 1px;">9999 IN 1</div>
        <button id="sound-toggle" class="head-btn muted">🔇 ЗВУК</button>
    </div>
    
    <div id="catalog-container">
        <!-- Временный векторный бэкграунд (заменим его на твою гифку) -->
        <svg class="retro-background-svg" viewBox="0 0 400 500" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg">
            <defs>
                <linearGradient id="skyGrad" x1="0" y1="0" x2="0" y2="1">
                    <stop offset="0%" stop-color="#2471a3"/><stop offset="45%" stop-color="#5dade2"/>
                    <stop offset="65%" stop-color="#ff7f50"/><stop offset="74%" stop-color="#f4d03f"/>
                    <stop offset="75%" stop-color="#1b4f72"/><stop offset="100%" stop-color="#0b2240"/>
                </linearGradient>
            </defs>
            <rect width="400" height="500" fill="url(#skyGrad)"/>
            <circle cx="200" cy="375" r="35" fill="#f5b041" opacity="0.8"/>
            <path d="M40 120 l8 4 l8 -4 M48 124 v4 M120 90 l6 3 l6 -3 M220 110 l10 5 l10 -5" stroke="#000" stroke-width="2" fill="none" opacity="0.7"/>
            <path d="M0 460 Q 100 440, 200 465 T 400 450 L 400 500 L 0 500 Z" fill="#d35400"/>
            <path d="M0 465 Q 120 450, 230 472 T 400 460 L 400 500 L 0 500 Z" fill="#e67e22"/>
        </svg>

        <div class="menu-title">9999 IN 1</div>
        <div class="game-list" id="retro-game-list"></div>
    </div>

    <div id="game-screen">
        <div id="game-container"><canvas id="nes-canvas" width="256" height="240"></canvas></div>
        <div id="gamepad">
            <div class="main-controls">
                <div class="dpad-cell">
                    <div class="dpad">
                        <div></div><div class="btn" id="up">▲</div><div></div>
                        <div class="btn" id="left">◀</div><div></div><div class="btn" id="right">▶</div>
                        <div></div><div class="btn" id="down">▼</div><div></div>
                    </div>
                </div>
                <div class="action-cell">
                    <div class="action-buttons">
                        <div class="round-btn" id="btn-b">B</div><div class="round-btn" id="btn-a">A</div>
                    </div>
                </div>
            </div>
            <div class="system-buttons">
                <div class="sys-row">
                    <div class="sys-btn" id="btn-select">SELECT</div><div class="sys-btn" id="btn-start">START</div>
                </div>
                <div class="sys-row">
                    <div class="sys-btn save-btn" id="btn-save">SAVE</div><div class="sys-btn load-btn" id="btn-load">LOAD</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        window.Telegram.WebApp.ready();
        window.Telegram.WebApp.expand();

        // 🔥 ЧИТАЕМ ИГРЫ ИЗ НАШЕГО ВНЕШНЕГО ФАЙЛА ГИТХАБА
        var gamesToLoad = window.MY_GAMES || [];
        var listContainer = document.getElementById('retro-game-list');
        
        gamesToLoad.forEach(function(game, index) {
            var num = (index + 1).toString().padStart(4, '0'); 
            var item = document.createElement('div');
            item.className = 'retro-item';
            item.textContent = num + ". " + game.title;
            item.addEventListener('click', function() {
                startGame(game.file, game.title);
            });
            listContainer.appendChild(item);
        });

        var canvas = document.getElementById('nes-canvas');
        var ctx = canvas.getContext('2d');
        var audioCtx = null;
        var audioEnabled = false;
        var bufferSize = 4096;
        var audioBuffer = new Float32Array(bufferSize);
        var audioBufferIndex = 0;
        var gameLoopInterval = null;
        var currentRomName = ""; 

        function initAudio() {
            if (audioCtx) return;
            var AudioContext = window.AudioContext || window.webkitAudioContext;
            audioCtx = new AudioContext({ sampleRate: 44100 });
            var scriptProcessor = audioCtx.createScriptProcessor(bufferSize, 0, 1);
            scriptProcessor.onaudioprocess = function(e) {
                var output = e.outputBuffer.getChannelData(0);
                for (var i = 0; i < bufferSize; i++) {
                    output[i] = audioEnabled ? audioBuffer[i] : 0;
                }
                audioBuffer.fill(0);
                audioBufferIndex = 0;
            };
            scriptProcessor.connect(audioCtx.destination);
        }

        var nes = new jsnes.NES({
            onFrame: function(buffer) {
                var imageData = ctx.getImageData(0, 0, 256, 240);
                var data = imageData.data;
                for (var i = 0; i < buffer.length; i++) {
                    var pixel = buffer[i];
                    var index = i * 4;
                    data[index] = pixel & 0xff; 
                    data[index+1] = (pixel >> 8) & 0xff;
                    data[index+2] = (pixel >> 16) & 0xff;
                    data[index+3] = 255;
                }
                ctx.putImageData(imageData, 0, 0);
            },
            onAudioSample: function(left, right) {
                if (!audioEnabled) return;
                if (audioBufferIndex < bufferSize) {
                    audioBuffer[audioBufferIndex++] = left;
                }
            }
        });

        var soundBtn = document.getElementById('sound-toggle');
        if (soundBtn) {
            soundBtn.addEventListener('click', function() {
                initAudio();
                if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
                audioEnabled = !audioEnabled;
                this.textContent = audioEnabled ? "🔊 ЗВУК: ВКЛ" : "🔇 ЗВУК";
                if(audioEnabled) this.classList.remove('muted'); else this.classList.add('muted');
            });
        }

        function startGame(romUrl, gameTitle) {
            currentRomName = romUrl; 
            document.getElementById('catalog-container').style.display = 'none';
            document.getElementById('game-screen').style.display = 'flex';
            document.getElementById('back-to-catalog').style.display = 'block';
            document.getElementById('main-title').textContent = gameTitle;
            
            if (window.Telegram && window.Telegram.WebApp && window.Telegram.WebApp.HapticFeedback) {
                window.Telegram.WebApp.HapticFeedback.impactOccurred('medium');
            }

            var req = new XMLHttpRequest();
            req.open("GET", romUrl, true);
            req.overrideMimeType("text/plain; charset=x-user-defined");
            req.onload = function() {
                if (req.status === 200) {
                    nes.loadROM(this.responseText);
                    if(gameLoopInterval) clearInterval(gameLoopInterval);
                    gameLoopInterval = setInterval(nes.frame, 1000 / 60);
                } else {
                    alert("ОШИБКА СЕТИ ПРИ ЗАГРУЗКЕ .NES ФАЙЛА!");
                    exitToCatalog();
                }
            };
            req.send();
        }

        function exitToCatalog() {
            if(gameLoopInterval) clearInterval(gameLoopInterval);
            document.getElementById('game-screen').style.display = 'none';
            document.getElementById('back-to-catalog').style.display = 'none';
            document.getElementById('catalog-container').style.display = 'flex';
            document.getElementById('main-title').textContent = '9999 IN 1';
            if (window.Telegram && window.Telegram.WebApp && window.Telegram.WebApp.HapticFeedback) {
                window.Telegram.WebApp.HapticFeedback.impactOccurred('light');
            }
        }
        
        var backBtn = document.getElementById('back-to-catalog');
        if (backBtn) { backBtn.addEventListener('click', exitToCatalog); }

        var saveBtn = document.getElementById('btn-save');
        if (saveBtn) {
            saveBtn.addEventListener('click', function() {
                try {
                    var state = nes.toJSON();
                    localStorage.setItem('save_' + currentRomName, JSON.stringify(state));
                    if (window.Telegram && window.Telegram.WebApp && window.Telegram.WebApp.HapticFeedback) {
                        window.Telegram.WebApp.HapticFeedback.notificationOccurred('success');
                    }
                    alert("💾 ПРОГРЕСС СОХРАНЕН!");
                } catch (err) { alert("ОШИБКА: " + err.message); }
            });
        }

        var loadBtn = document.getElementById('btn-load');
        if (loadBtn) {
            loadBtn.addEventListener('click', function() {
                try {
                    var savedData = localStorage.getItem('save_' + currentRomName);
                    if (!savedData) { alert("🤷‍♂️ НЕТ СОХРАНЕНИЙ!"); return; }
                    nes.fromJSON(JSON.parse(savedData));
                    if (window.Telegram && window.Telegram.WebApp && window.Telegram.WebApp.HapticFeedback) {
                        window.Telegram.WebApp.HapticFeedback.notificationOccurred('success');
                    }
                } catch (err) { alert("ОШИБКА: " + err.message); }
            });
        }

        function bindKey(elementId, nesKey) {
            var el = document.getElementById(elementId);
            if(el) {
                el.addEventListener('touchstart', function(e) { e.preventDefault(); nes.buttonDown(1, nesKey); });
                el.addEventListener('touchend', function(e) { e.preventDefault(); nes.buttonUp(1, nesKey); });
                el.addEventListener('mousedown', function(e) { nes.buttonDown(1, nesKey); });
                el.addEventListener('mouseup', function(e) { nes.buttonUp(1, nesKey); });
            }
        }
        bindKey('up', jsnes.Controller.BUTTON_UP); bindKey('down', jsnes.Controller.BUTTON_DOWN);
        bindKey('left', jsnes.Controller.BUTTON_LEFT); bindKey('right', jsnes.Controller.BUTTON_RIGHT);
        bindKey('btn-a', jsnes.Controller.BUTTON_A); bindKey('btn-b', jsnes.Controller.BUTTON_B);
        bindKey('btn-start', jsnes.Controller.BUTTON_START); bindKey('btn-select', jsnes.Controller.BUTTON_SELECT);
    </script>
</body>
</html>
