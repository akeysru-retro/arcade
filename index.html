<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Akeys Retro Arcade</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jsnes/1.2.1/jsnes.min.js"></script>
    <style>
        body {
            background-color: #111;
            color: #fff;
            margin: 0;
            padding: 0;
            font-family: sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            height: 100vh;
            overflow: hidden;
            user-select: none;
        }
        #game-container {
            width: 100%;
            max-width: 400px;
            background: #000;
            position: relative;
        }
        canvas {
            width: 100%;
            display: block;
            image-rendering: pixelated;
        }
        
        /* Главная панель управления */
        #gamepad {
            display: flex;
            flex-direction: column;
            width: 100%;
            max-width: 400px;
            flex-grow: 1;
            background: #1a1a1a;
            padding: 10px 15px 20px 15px;
            box-sizing: border-box;
            justify-content: space-between;
        }

        /* Верхняя часть: Крестовина и Кнопки А/В */
        .main-controls {
            display: table;
            width: 100%;
            margin-top: 10px;
        }
        .dpad-cell {
            display: table-cell;
            width: 50%;
            vertical-align: middle;
        }
        .action-cell {
            display: table-cell;
            width: 50%;
            vertical-align: middle;
            text-align: right;
        }

        /* Стили крестовины */
        .dpad {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            grid-template-rows: repeat(3, 1fr);
            width: 140px;
            height: 140px;
            margin: 0 auto;
        }
        .btn {
            background: #333;
            border: 2px solid #555;
            color: white;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 18px;
        }
        .btn:active { background: #555; }
        
        /* Стили кнопок действий */
        .action-buttons {
            display: inline-flex;
            gap: 15px;
            justify-content: center;
        }
        .round-btn {
            width: 65px;
            height: 65px;
            background: #ff3b30;
            border-radius: 50%;
            border: 3px solid #fff;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 22px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }
        .round-btn:active { background: #b3261e; }
        
        /* 🔥 Нижняя скрытая панель для Старт/Селект */
        .system-buttons {
            display: flex;
            justify-content: center;
            gap: 30px;
            width: 100%;
            margin-top: 15px;
            padding-top: 10px;
            border-top: 1px solid #2a2a2a;
        }
        .sys-btn {
            background: #444;
            border: 1px solid #555;
            color: #aaa;
            width: 75px;
            height: 22px;
            border-radius: 12px;
            font-size: 10px;
            font-weight: bold;
            text-transform: uppercase;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: inset 0 2px 3px rgba(0,0,0,0.5);
        }
        .sys-btn:active { 
            background: #222; 
            color: #fff;
        }
    </style>
</head>
<body>

    <h3 style="margin: 6px 0; font-size: 15px; letter-spacing: 1px;">🕹️ AKEYS RETRO 🕹️</h3>
    
    <div id="game-container">
        <canvas id="nes-canvas" width="256" height="240"></canvas>
    </div>

    <!-- Общий пульт управления -->
    <div id="gamepad">
        
        <!-- Верхний ярус: Игровые кнопки -->
        <div class="main-controls">
            <div class="dpad-cell">
                <div class="dpad">
                    <div></div><div class="btn" id="up">▲</div><div></div>
                    <div class="btn" id="left">◀</div><div></div><div class="btn" id="right">▶</div>
                    <div></div><div class="btn" id="down">▼</div><div></div>
                </div>
            </div>
            
            <div class="action-cell">
                <div class="action-buttons">
                    <div class="round-btn" id="btn-b">B</div>
                    <div class="round-btn" id="btn-a">A</div>
                </div>
            </div>
        </div>
        
        <!-- 🔥 Нижний ярус: Узкие системные кнопки, защищенные от случайных кликов -->
        <div class="system-buttons">
            <div class="sys-btn" id="btn-select">Select</div>
            <div class="sys-btn" id="btn-start">Start</div>
        </div>
        
    </div>

    <script>
        window.Telegram.WebApp.ready();
        window.Telegram.WebApp.expand();

        var canvas = document.getElementById('nes-canvas');
        var ctx = canvas.getContext('2d');
        
        var nes = new jsnes.NES({
            onFrame: function(buffer) {
                var imageData = ctx.getImageData(0, 0, 256, 240);
                var data = imageData.data;
                for (var i = 0; i < buffer.length; i++) {
                    var pixel = buffer[i];
                    var r = pixel & 0xff; 
                    var g = (pixel >> 8) & 0xff;
                    var b = (pixel >> 16) & 0xff;
                    var index = i * 4;
                    data[index] = r;
                    data[index+1] = g;
                    data[index+2] = b;
                    data[index+3] = 255;
                }
                ctx.putImageData(imageData, 0, 0);
            }
        });

        function loadRom(url) {
            var req = new XMLHttpRequest();
            req.open("GET", url, true);
            req.overrideMimeType("text/plain; charset=x-user-defined");
            req.onload = function() {
                if (req.status === 200) {
                    nes.loadROM(this.responseText);
                    setInterval(nes.frame, 1000 / 60);
                }
            };
            req.send();
        }

        loadRom("mario.nes"); 

        function bindKey(elementId, nesKey) {
            var el = document.getElementById(elementId);
            if(el) {
                el.addEventListener('touchstart', function(e) { e.preventDefault(); nes.buttonDown(1, nesKey); });
                el.addEventListener('touchend', function(e) { e.preventDefault(); nes.buttonUp(1, nesKey); });
                el.addEventListener('mousedown', function(e) { nes.buttonDown(1, nesKey); });
                el.addEventListener('mouseup', function(e) { nes.buttonUp(1, nesKey); });
            }
        }

        bindKey('up', jsnes.Controller.BUTTON_UP);
        bindKey('down', jsnes.Controller.BUTTON_DOWN);
        bindKey('left', jsnes.Controller.BUTTON_LEFT);
        bindKey('right', jsnes.Controller.BUTTON_RIGHT);
        bindKey('btn-a', jsnes.Controller.BUTTON_A);
        bindKey('btn-b', jsnes.Controller.BUTTON_B);
        bindKey('btn-start', jsnes.Controller.BUTTON_START);
        bindKey('btn-select', jsnes.Controller.BUTTON_SELECT);
    </script>
</body>
</html>
