<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>9999 IN 1 - Ultimate Retro Arcade</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jsnes/1.2.1/jsnes.min.js"></script>
    <script src="games.js"></script>

    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        body {
            background-color: #000; color: #fff; margin: 0; padding: 0;
            font-family: 'Press Start 2P', monospace;
            display: flex; flex-direction: column; align-items: center; justify-content: flex-start;
            height: 100vh; overflow: hidden; user-select: none;
        }
        .header-panel {
            display: flex; width: 100%; max-width: 400px; justify-content: space-between; align-items: center;
            padding: 8px 15px; box-sizing: border-box; background: #000; border-bottom: 2px solid #333; z-index: 10;
        }
        .head-btn {
            background: #222; border: 2px solid #555; color: #fff;
            font-family: 'Press Start 2P', monospace; font-size: 8px; padding: 6px 10px; cursor: pointer;
        }
        #sound-toggle.muted { color: #ffaa00; border-color: #663333; }
        #back-to-catalog { display: none; background: #224; border-color: #448; }

        #catalog-container {
            width: 100%; max-width: 400px; flex-grow: 1; overflow-y: auto; position: relative;
            background-color: #111;
            display: flex; flex-direction: column; align-items: center; padding-top: 25px; box-sizing: border-box;
        }
        .menu-title { font-size: 20px; color: #ffff00; text-shadow: 3px 3px #000; margin-bottom: 25px; text-align: center; letter-spacing: 2px; z-index: 5; }
        .game-list { width: 100%; padding: 0 25px; box-sizing: border-box; z-index: 5; position: relative; }
        .retro-item { font-size: 11px; color: #fff; text-shadow: 2px 2px #000; padding: 12px 0; cursor: pointer; display: flex; align-items: center; text-transform: uppercase; }
        .retro-item:active { color: #ffff00; }
        .retro-item::before { content: "▶ "; opacity: 0; margin-right: 8px; color: #ffff00; }
        .retro-item:active::before { opacity: 1; }

        /* ЭКРАН ИГРЫ */
        #game-screen { display: none; width: 100%; flex-direction: column; align-items: center; flex-grow: 1; background: #000; }
        #game-container { width: 100%; max-width: 400px; background: #000; display: flex; justify-content: center; }
        canvas { width: 100%; max-height: 240px; display: block; image-rendering: pixelated; }
        
        /* ГЕЙМПАД */
        #gamepad {
            display: flex; flex-direction: column; width: 100%; max-width: 400px; flex-grow: 1;
            background: #111; padding: 15px; box-sizing: border-box; justify-content: space-between; border-top: 4px solid #222;
        }
        .main-controls { display: flex; width: 100%; justify-content: space-between; align-items: center; }
        .dpad { display: grid; grid-template-columns: repeat(3, 1fr); grid-template-rows: repeat(3, 1fr); width: 130px; height: 130px; }
        .btn { background: #222; border: 3px solid #444; color: white; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 14px; }
        .btn:active { background: #444; }
        
        /* КНОПКИ NES (Денди) */
        #nes-buttons { display: inline-flex; gap: 15px; }
        .round-btn { width: 60px; height: 60px; background: #cc1111; border-radius: 50%; border: 4px solid #fff; color: white; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 16px; font-family: sans-serif; box-shadow: 0 4px 0 #880000; }
        .round-btn:active { background: #aa0000; transform: translateY(4px); box-shadow: none; }
        
        /* КНОПКИ СЕГИ / SNES (Универсальная 6-кнопочная панель) */
        #sega-buttons { display: none; grid-template-columns: repeat(3, 50px); gap: 8px; }
        .sega-btn { width: 48px; height: 48px; background: #2e2e2e; border: 3px solid #666; color: #fff; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 14px; font-weight: bold; font-family: sans-serif; box-shadow: 0 3px 0 #000; }
        .sega-btn:active { background: #555; transform: translateY(3px); box-shadow: none; }
        .sega-main { background: #cc1111; border-color: #ff5555; }

        .system-buttons { display: flex; flex-direction: column; gap: 10px; width: 100%; }
        .sys-row { display: flex; justify-content: center; gap: 20px; }
        .sys-btn { background: #333; border: 2px solid #555; color: #aaa; width: 80px; height: 22px; border-radius: 4px; font-size: 8px; display: flex; align-items: center; justify-content: center; cursor: pointer; }
        .sys-btn:active { background: #111; color: #fff; }
        .save-btn { background: #1e3d1e; border-color: #387338; color: #8fdf8f; }
        .load-btn { background: #1e2e3d; border-color: #385973; color: #8fbadf; }
    </style>
</head>
<body>

    <div class="header-panel">
        <button id="back-to-catalog" class="head-btn">↩ МЕНЮ</button>
        <div id="main-title" style="font-size: 8px; letter-spacing: 1px;">9999 IN 1</div>
        <button id="sound-toggle" class="head-btn muted">🔇 ЗВУК</button>
    </div>
    
    <div id="catalog-container">
        <div class="menu-title">9999 IN 1</div>
        <div class="game-list" id="retro-game-list"></div>
    </div>

    <div id="game-screen">
        <div id="game-container"><canvas id="nes-canvas" width="256" height="240"></canvas></div>
        <div id="gamepad">
            <div class="main-controls">
                <div class="dpad">
                    <div></div><div class="btn" id="up">▲</div><div></div>
                    <div class="btn" id="left">◀</div><div></div><div class="btn" id="right">▶</div>
                    <div></div><div class="btn" id="down">▼</div><div></div>
                </div>
                
                <div id="nes-buttons">
                    <div class="round-btn" id="btn-b">B</div>
                    <div class="round-btn" id="btn-a">A</div>
                </div>

                <div id="sega-buttons">
                    <div class="sega-btn" id="btn-x">X</div><div class="sega-btn" id="btn-y">Y</div><div class="sega-btn" id="btn-z">Z</div>
                    <div class="sega-btn sega-main" id="btn-sega-a">A</div><div class="sega-btn sega-main" id="btn-sega-b">B</div><div class="sega-btn sega-main" id="btn-sega-c">C</div>
                </div>
            </div>
            
            <div class="system-buttons">
                <div class="sys-row">
                    <div class="sys-btn" id="btn-select">SELECT</div><div class="sys-btn" id="btn-start">START</div>
                </div>
                <div class="sys-row">
                    <div class="sys-btn save-btn" id="btn-save">SAVE</div><div class="sys-btn load-btn" id="btn-load">LOAD</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        window.Telegram.WebApp.ready();
        window.Telegram.WebApp.expand();

        var gamesToLoad = window.MY_GAMES || [];
        var listContainer = document.getElementById('retro-game-list');
        
        if (listContainer) {
            listContainer.innerHTML = "";
            gamesToLoad.forEach(function(game, index) {
                var num = (index + 1).toString().padStart(4, '0'); 
                var item = document.createElement('div');
                item.className = 'retro-item';
                item.textContent = num + ". " + game.title;
                item.addEventListener('click', function() {
                    startGame(game.file, game.title, game.system);
                });
                listContainer.appendChild(item);
            });
        }

        var canvas = document.getElementById('nes-canvas');
        var ctx = canvas.getContext('2d');
        var audioCtx = null;
        var audioEnabled = false;
        var gameLoopInterval = null;
        var currentRomName = ""; 
        var currentSystem = "nes";

        // NES Эмулятор
        var nes = new jsnes.NES({
            onFrame: function(buffer) {
                var imageData = ctx.getImageData(0, 0, 256, 240);
                var data = imageData.data;
                for (var i = 0; i < buffer.length; i++) {
                    var pixel = buffer[i];
                    var index = i * 4;
                    data[index] = pixel & 0xff; 
                    data[index+1] = (pixel >> 8) & 0xff;
                    data[index+2] = (pixel >> 16) & 0xff;
                    data[index+3] = 255;
                }
                ctx.putImageData(imageData, 0, 0);
            }
        });

        function startGame(romUrl, gameTitle, system) {
            currentRomName = romUrl;
            currentSystem = system || "nes";
            
            document.getElementById('catalog-container').style.display = 'none';
            document.getElementById('game-screen').style.display = 'flex';
            document.getElementById('back-to-catalog').style.display = 'block';
            document.getElementById('main-title').textContent = gameTitle;

            if (currentSystem === "sega" || currentSystem === "snes") {
                document.getElementById('nes-buttons').style.display = 'none';
                document.getElementById('sega-buttons').style.display = 'grid';
            } else {
                document.getElementById('nes-buttons').style.display = 'inline-flex';
                document.getElementById('sega-buttons').style.display = 'none';
            }
            
            if (window.Telegram?.WebApp?.HapticFeedback) {
                window.Telegram.WebApp.HapticFeedback.impactOccurred('medium');
            }

            var req = new XMLHttpRequest();
            req.open("GET", romUrl, true);
            req.overrideMimeType("text/plain; charset=x-user-defined");
            req.onload = function() {
                if (req.status === 200) {
                    if (currentSystem === "nes") {
                        nes.loadROM(this.responseText);
                        if(gameLoopInterval) clearInterval(gameLoopInterval);
                        gameLoopInterval = setInterval(nes.frame, 1000 / 60);
                    } else if (currentSystem === "sega") {
                        initWasmSega(this.responseText);
                    } else if (currentSystem === "snes") {
                        initWasmSnes(this.responseText);
                    }
                } else {
                    alert("ОШИБКА ЗАГРУЗКИ РОМА!");
                    exitToCatalog();
                }
            };
            req.send();
        }

        // 🔥 ИНИЦИАЛИЗАЦИЯ И СВЯЗЫВАНИЕ КНОПОК ДЛЯ WASM ДВИЖКОВ
        function initWasmSega(romData) {
            console.log("Загрузка Sega ядра WASM...");
            // Здесь будет инициализация PicoDrive/GenesisPlus GX контекста
            // На выходе перенаправляем кадры на наш canvas
        }

        function initWasmSnes(romData) {
            console.log("Загрузка SNES ядра WASM...");
            // Здесь будет инициализация Snes9x контекста
        }

        function exitToCatalog() {
            if(gameLoopInterval) clearInterval(gameLoopInterval);
            document.getElementById('game-screen').style.display = 'none';
            document.getElementById('back-to-catalog').style.display = 'none';
            document.getElementById('catalog-container').style.display = 'flex';
            document.getElementById('main-title').textContent = '9999 IN 1';
        }
        
        document.getElementById('back-to-catalog').addEventListener('click', exitToCatalog);

        // УНИВЕРСАЛЬНЫЙ ТРАНСЛЯТОР КНОПОК УПРАВЛЕНИЯ
        function sendKeyEvent(key, isPressed) {
            if (currentSystem === "nes") {
                if (isPressed) nes.buttonDown(1, key); else nes.buttonUp(1, key);
            } else {
                // Логика передачи кодов для WASM модулей (Sega / SNES)
                console.log(`Система: ${currentSystem}, Кнопка: ${key}, Нажата: ${isPressed}`);
            }
        }

        function bindKey(elementId, nesKey) {
            var el = document.getElementById(elementId);
            if(el) {
                el.addEventListener('touchstart', function(e) { e.preventDefault(); sendKeyEvent(nesKey, true); });
                el.addEventListener('touchend', function(e) { e.preventDefault(); sendKeyEvent(nesKey, false); });
                el.addEventListener('mousedown', function(e) { sendKeyEvent(nesKey, true); });
                el.addEventListener('mouseup', function(e) { sendKeyEvent(nesKey, false); });
            }
        }

        // Привязка D-PAD и кнопок NES
        bindKey('up', jsnes.Controller.BUTTON_UP); bindKey('down', jsnes.Controller.BUTTON_DOWN);
        bindKey('left', jsnes.Controller.BUTTON_LEFT); bindKey('right', jsnes.Controller.BUTTON_RIGHT);
        bindKey('btn-a', jsnes.Controller.BUTTON_A); bindKey('btn-b', jsnes.Controller.BUTTON_B);
        bindKey('btn-start', jsnes.Controller.BUTTON_START); bindKey('btn-select', jsnes.Controller.BUTTON_SELECT);

        // Привязка кнопок Sega/SNES
        var segaButtons = ['btn-sega-a', 'btn-sega-b', 'btn-sega-c', 'btn-x', 'btn-y', 'btn-z'];
        segaButtons.forEach(id => {
            var el = document.getElementById(id);
            if(el) {
                el.addEventListener('touchstart', (e) => { e.preventDefault(); sendKeyEvent(id.replace('btn-',''), true); });
                el.addEventListener('touchend', (e) => { e.preventDefault(); sendKeyEvent(id.replace('btn-',''), false); });
            }
        });

        // 💾 РАБОТА С СОХРАНЕНИЯМИ (SAVE / LOAD) через Web LocalStorage
        document.getElementById('btn-save').addEventListener('click', function() {
            if (!currentRomName) return;
            try {
                let saveData = null;
                if (currentSystem === "nes") {
                    saveData = JSON.stringify(nes.toJSON());
                } else {
                    // Для WASM ядра: saveData = Module.FS.readFile('/save.srm');
                    saveData = "wasm_dummy_save_data"; 
                }
                localStorage.setItem("save_" + currentRomName, saveData);
                alert("ИГРА СОХРАНЕНА!");
            } catch(e) {
                alert("Ошибка сохранения: " + e.message);
            }
        });

        document.getElementById('btn-load').addEventListener('click', function() {
            if (!currentRomName) return;
            let data = localStorage.getItem("save_" + currentRomName);
            if (!data) {
                alert("НЕТ СОХРАНЕНИЙ ДЛЯ ЭТОЙ ИГРЫ");
                return;
            }
            try {
                if (currentSystem === "nes") {
                    nes.fromJSON(JSON.parse(data));
                } else {
                    // Для WASM: Module.FS.writeFile('/save.srm', data);
                }
                alert("ЗАГРУЗКА УСПЕШНА!");
            } catch(e) {
                alert("Ошибка загрузки: " + e.message);
            }
        });
    </script>
</body>
</html>
