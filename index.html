<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>9999 IN 1 - Ultimate Retro Arcade</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jsnes/1.2.1/jsnes.min.js"></script>
    <script src="games.js"></script>

    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        body, html {
            background-color: #000; color: #fff; margin: 0; padding: 0;
            font-family: 'Press Start 2P', monospace;
            height: 100vh; overflow: hidden; user-select: none;
        }
        body {
            display: flex; flex-direction: column; align-items: center; justify-content: flex-start;
        }
        .header-panel {
            display: flex; width: 100%; max-width: 400px; justify-content: space-between; align-items: center;
            padding: 8px 15px; box-sizing: border-box; background: #000; border-bottom: 2px solid #333; 
            position: relative; z-index: 10000;
        }
        .head-btn {
            background: #222; border: 2px solid #555; color: #fff;
            font-family: 'Press Start 2P', monospace; font-size: 8px; padding: 6px 10px; cursor: pointer;
        }
        #sound-toggle.muted { color: #ffaa00; border-color: #663333; }
        #back-to-catalog { display: none; background: #224; border-color: #448; }

        /* ИГРОВОЙ КАТАЛОГ С ВИДЕО-ФОНОМ */
        #catalog-container {
            width: 100%; max-width: 400px; flex-grow: 1; overflow-y: auto; position: relative;
            background-color: #000;
            display: flex; flex-direction: column; align-items: center; padding-top: 25px; box-sizing: border-box;
            z-index: 10;
        }
        .bg-video {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            object-fit: cover; z-index: 1; pointer-events: none;
        }
        .menu-title, .game-list { z-index: 5; position: relative; }

        .menu-title { font-size: 20px; color: #ffff00; text-shadow: 3px 3px #000; margin-bottom: 25px; text-align: center; letter-spacing: 2px; }
        .game-list { width: 100%; padding: 0 25px; box-sizing: border-box; }
        .retro-item { font-size: 11px; color: #fff; text-shadow: 2px 2px #000; padding: 12px 0; cursor: pointer; display: flex; align-items: center; text-transform: uppercase; }
        .retro-item:active { color: #ffff00; }
        .retro-item::before { content: "▶ "; opacity: 0; margin-right: 8px; color: #ffff00; }
        .retro-item:active::before { opacity: 1; }

        /* ЭКРАН ИГРЫ */
        #game-screen { display: none; width: 100%; max-width: 400px; flex-direction: column; align-items: center; flex-grow: 1; background: #000; position: relative; z-index: 20; }
        
        /* ИСПРАВЛЕННЫЙ КОНТЕЙНЕР ДЛЯ РЕНДЕРА ДЕНДИ */
        #game-container { 
            width: 100%; 
            flex-grow: 1; 
            max-height: calc(100vh - 250px); /* Оставляем чёткое место под геймпад снизу */
            background: #000; 
            position: relative; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            overflow: hidden;
            padding-top: 15px; /* Аккуратный отступ, чтобы игра не липла к шапке */
            box-sizing: border-box;
        }
        #nes-canvas { 
            width: 100%; 
            max-height: 100%;
            object-fit: contain; /* Пропорционально вписывает игру в экран */
            display: block; 
            image-rendering: pixelated; 
        }

        /* ИЗОЛИРОВАННЫЙ ФРЕЙМ ПОД КОД КОНФИГУРАТОРА EMULATOR JS */
        #sega-display-container { 
            display: none; 
            width: 100%; 
            max-width: 400px;
            height: calc(100vh - 44px); 
            position: absolute; 
            top: 44px; 
            left: 0; 
            z-index: 999; 
            background: #000; 
        }
        #sega-display-container iframe {
            width: 100%; height: 100%; border: none; display: block;
        }

        /* РОДНОЙ ГЕЙМПАД ДЛЯ NES */
        #gamepad {
            display: flex; flex-direction: column; width: 100%; padding: 15px; box-sizing: border-box; justify-content: space-between; border-top: 4px solid #222; background: #111; position: absolute; bottom: 0; left: 0; right: 0; z-index: 30;
        }
        .main-controls { display: flex; width: 100%; justify-content: space-between; align-items: center; }
        .dpad { display: grid; grid-template-columns: repeat(3, 1fr); grid-template-rows: repeat(3, 1fr); width: 130px; height: 130px; }
        .btn { background: #222; border: 3px solid #444; color: white; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 14px; }
        .btn:active { background: #444; }
        
        #nes-buttons { display: inline-flex; gap: 15px; }
        .round-btn { width: 60px; height: 60px; background: #cc1111; border-radius: 50%; border: 4px solid #fff; color: white; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 16px; font-family: sans-serif; box-shadow: 0 4px 0 #880000; }
        .round-btn:active { background: #aa0000; transform: translateY(4px); box-shadow: none; }
        
        .system-buttons { display: flex; flex-direction: column; gap: 10px; width: 100%; margin-top: 15px; }
        .sys-row { display: flex; justify-content: center; gap: 20px; }
        .sys-btn { background: #333; border: 2px solid #555; color: #aaa; width: 80px; height: 22px; border-radius: 4px; font-size: 8px; display: flex; align-items: center; justify-content: center; }
        .sys-btn:active { background: #111; color: #fff; }
        .save-btn { background: #1e3d1e; border-color: #387338; color: #8fdf8f; }
        .load-btn { background: #1e2e3d; border-color: #385973; color: #8fbadf; }
    </style>
</head>
<body>

    <div class="header-panel">
        <button id="back-to-catalog" class="head-btn">↩ МЕНЮ</button>
        <div id="main-title" style="font-size: 8px; letter-spacing: 1px;">9999 IN 1</div>
        <button id="sound-toggle" class="head-btn muted">🔇 ЗВУК</button>
    </div>
    
    <div id="catalog-container">
        <video id="menu-bg-video" class="bg-video" loop playsinline webkit-playsinline>
            <source src="background-video.mp4" type="video/mp4">
        </video>

        <div class="menu-title">9999 IN 1</div>
        <div class="game-list" id="retro-game-list"></div>
    </div>

    <div id="game-screen">
        <div id="game-container">
            <canvas id="nes-canvas" width="256" height="240"></canvas>
        </div>
        
        <div id="sega-display-container"></div>

        <div id="gamepad">
            <div class="main-controls">
                <div class="dpad">
                    <div></div><div class="btn" id="up">▲</div><div></div>
                    <div class="btn" id="left">◀</div><div></div><div class="btn" id="right">▶</div>
                    <div></div><div class="btn" id="down">▼</div><div></div>
                </div>
                <div id="nes-buttons">
                    <div class="round-btn" id="btn-b">B</div>
                    <div class="round-btn" id="btn-a">A</div>
                </div>
            </div>
            <div class="system-buttons">
                <div class="sys-row">
                    <div class="sys-btn" id="btn-select">SELECT</div><div class="sys-btn" id="btn-start">START</div>
                </div>
                <div class="sys-row">
                    <div class="sys-btn save-btn" id="btn-save">SAVE</div><div class="sys-btn load-btn" id="btn-load">LOAD</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        window.Telegram.WebApp.ready();
        window.Telegram.WebApp.expand();

        var gamesToLoad = window.MY_GAMES || [];
        var listContainer = document.getElementById('retro-game-list');
        
        if (listContainer) {
            listContainer.innerHTML = "";
            gamesToLoad.forEach(function(game, index) {
                var num = (index + 1).toString().padStart(4, '0'); 
                var item = document.createElement('div');
                item.className = 'retro-item';
                item.textContent = num + ". " + game.title;
                item.addEventListener('click', function() {
                    startGame(game.file, game.title, game.system);
                });
                listContainer.appendChild(item);
            });
        }

        var canvas = document.getElementById('nes-canvas');
        var ctx = canvas.getContext('2d');
        var audioCtx = null;
        var audioEnabled = false;
        var bufferSize = 4096;
        var audioBuffer = new Float32Array(bufferSize);
        var audioBufferIndex = 0;
        var gameLoopInterval = null;
        var currentRomName = ""; 
        var currentSystem = "nes";
        var videoEl = document.getElementById('menu-bg-video');

        if(videoEl) {
            videoEl.muted = true;
            videoEl.play().catch(function(e){});
        }

        var nes = new jsnes.NES({
            onFrame: function(buffer) {
                var imageData = ctx.getImageData(0, 0, 256, 240);
                var data = imageData.data;
                for (var i = 0; i < buffer.length; i++) {
                    var pixel = buffer[i];
                    var index = i * 4;
                    data[index] = pixel & 0xff; 
                    data[index+1] = (pixel >> 8) & 0xff;
                    data[index+2] = (pixel >> 16) & 0xff;
                    data[index+3] = 255;
                }
                ctx.putImageData(imageData, 0, 0);
            },
            onAudioSample: function(left, right) {
                if (!audioEnabled) return;
                if (audioBufferIndex < bufferSize) {
                    audioBuffer[audioBufferIndex++] = left;
                }
            }
        });

        function initAudio() {
            if (audioCtx) return;
            var AudioContext = window.AudioContext || window.webkitAudioContext;
            audioCtx = new AudioContext({ sampleRate: 44100 });
            var scriptProcessor = audioCtx.createScriptProcessor(bufferSize, 0, 1);
            scriptProcessor.onaudioprocess = function(e) {
                var output = e.outputBuffer.getChannelData(0);
                for (var i = 0; i < bufferSize; i++) {
                    output[i] = audioEnabled ? audioBuffer[i] : 0;
                }
                audioBuffer.fill(0);
                audioBufferIndex = 0;
            };
            scriptProcessor.connect(audioCtx.destination);
        }

        var soundBtn = document.getElementById('sound-toggle');
        if (soundBtn) {
            soundBtn.addEventListener('click', function() {
                initAudio();
                if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
                audioEnabled = !audioEnabled;
                this.textContent = audioEnabled ? "🔊 ЗВУК: ВКЛ" : "🔇 ЗВУК";
                if(videoEl) videoEl.muted = !audioEnabled;
                if(audioEnabled) this.classList.remove('muted'); else this.classList.add('muted');
            });
        }

        function launchIsolatedEmulatorJS(romUrl, systemType, gameTitle) {
            var container = document.getElementById('sega-display-container');
            container.innerHTML = ""; 

            var coreType = (systemType === "sega") ? "segaMD" : "snes";
            var absoluteRomUrl = window.location.origin + window.location.pathname.replace("index.html", "") + romUrl;
            var initialVolume = audioEnabled ? 1 : 0;

            var iframeHtml = `
            <!DOCTYPE html>
            <html>
            <head>
                <meta charset="UTF-8">
                <style>
                    body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; overflow: hidden; }
                    #game { width: 100%; height: 100%; }
                </style>
                <script>
                    if (!('ontouchstart' in window)) { window.ontouchstart = function(){}; }
                    if (!navigator.maxTouchPoints || navigator.maxTouchPoints === 0) {
                        Object.defineProperty(navigator, 'maxTouchPoints', {get: function(){return 5;}});
                    }
                <\/script>
            </head>
            <body>
                <div id="game"></div>
                <script>
                    EJS_player = "#game";
                    EJS_core = "${coreType}";
                    EJS_gameName = "${gameTitle}";
                    EJS_color = "#0064ff";
                    EJS_pathtodata = "https://cdn.emulatorjs.org/stable/data/";
                    EJS_gameUrl = "${absoluteRomUrl}";
                    EJS_startOnLoaded = true;
                    EJS_Volume = ${initialVolume};
                    EJS_Header = false;
                    EJS_mouse = false;
                <\/script>
                <script src="https://cdn.emulatorjs.org/stable/data/loader.js"><\/script>
            </body>
            </html>
            `;

            var iframe = document.createElement('iframe');
            iframe.id = "active-emulator-iframe";
            iframe.srcdoc = iframeHtml;
            container.appendChild(iframe);
        }

        function startGame(romUrl, gameTitle, system) {
            currentRomName = romUrl;
            currentSystem = system || "nes";
            
            if(videoEl) videoEl.pause();

            document.getElementById('catalog-container').style.display = 'none';
            document.getElementById('game-screen').style.display = 'flex';
            document.getElementById('back-to-catalog').style.display = 'block';
            document.getElementById('main-title').textContent = gameTitle;

            if (currentSystem === "sega" || currentSystem === "snes") {
                document.getElementById('game-container').style.display = 'none';
                document.getElementById('gamepad').style.display = 'none'; 
                document.getElementById('sega-display-container').style.display = 'block';
                launchIsolatedEmulatorJS(romUrl, currentSystem, gameTitle);
            } else {
                document.getElementById('game-container').style.display = 'flex';
                document.getElementById('gamepad').style.display = 'flex';
                document.getElementById('sega-display-container').style.display = 'none';
                
                var req = new XMLHttpRequest();
                req.open("GET", romUrl, true);
                req.overrideMimeType("text/plain; charset=x-user-defined");
                req.onload = function() {
                    if (req.status === 200) {
                        nes.loadROM(this.responseText);
                        if(gameLoopInterval) clearInterval(gameLoopInterval);
                        gameLoopInterval = setInterval(nes.frame, 1000 / 60);
                    } else {
                        alert("ОШИБКА ЗАГРУЗКИ РОМА!");
                        exitToCatalog();
                    }
                };
                req.send();
            }
            
            if (window.Telegram && window.Telegram.WebApp && window.Telegram.WebApp.HapticFeedback) {
                window.Telegram.WebApp.HapticFeedback.impactOccurred('medium');
            }
        }

        function exitToCatalog() {
            if(gameLoopInterval) clearInterval(gameLoopInterval);
            
            if(videoEl) videoEl.play().catch(function(e){});

            if(currentSystem === "sega" || currentSystem === "snes") {
                var container = document.getElementById('sega-display-container');
                var iframe = document.getElementById('active-emulator-iframe');
                if(iframe) {
                    iframe.src = "about:blank"; 
                    iframe.remove();
                }
                container.innerHTML = ""; 
                container.style.display = "none";
            }

            document.getElementById('game-screen').style.display = 'none';
            document.getElementById('back-to-catalog').style.display = 'none';
            document.getElementById('catalog-container').style.display = 'flex';
            document.getElementById('main-title').textContent = '9999 IN 1';
        }
        
        document.getElementById('back-to-catalog').addEventListener('click', exitToCatalog);

        function bindKey(elementId, nesKey) {
            var el = document.getElementById(elementId);
            if(el) {
                el.addEventListener('touchstart', function(e) { e.preventDefault(); if(currentSystem === "nes") nes.buttonDown(1, nesKey); });
                el.addEventListener('touchend', function(e) { e.preventDefault(); if(currentSystem === "nes") nes.buttonUp(1, nesKey); });
                el.addEventListener('mousedown', function(e) { if(currentSystem === "nes") nes.buttonDown(1, nesKey); });
                el.addEventListener('mouseup', function(e) { if(currentSystem === "nes") nes.buttonUp(1, nesKey); });
            }
        }
        bindKey('up', jsnes.Controller.BUTTON_UP); bindKey('down', jsnes.Controller.BUTTON_DOWN);
        bindKey('left', jsnes.Controller.BUTTON_LEFT); bindKey('right', jsnes.Controller.BUTTON_RIGHT);
        bindKey('btn-a', jsnes.Controller.BUTTON_A); bindKey('btn-b', jsnes.Controller.BUTTON_B);
        bindKey('btn-start', jsnes.Controller.BUTTON_START); bindKey('btn-select', jsnes.Controller.BUTTON_SELECT);

        document.getElementById('btn-save').addEventListener('click', function() {
            if (currentSystem === "nes" && currentRomName) {
                localStorage.setItem("save_" + currentRomName, JSON.stringify(nes.toJSON()));
                alert("ИГРА NES СОХРАНЕНА!");
            }
        });

        document.getElementById('btn-load').addEventListener('click', function() {
            if (currentSystem === "nes" && currentRomName) {
                var data = localStorage.getItem("save_" + currentRomName);
                if (data) { nes.fromJSON(JSON.parse(data)); alert("ЗАГРУЗКА УСПЕШНА!"); }
                else { alert("НЕТ СОХРАНЕНИЙ"); }
            }
        });
    </script>
</body>
</html>
