<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Retro Arcade Player</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; overflow: hidden; }
        #game { width: 100vw; height: 100vh; }
    </style>
</head>
<body>
    <div id="game"></div>
    <script>
        if (!('ontouchstart' in window)) { window.ontouchstart = function(){}; }
        if (!navigator.maxTouchPoints || navigator.maxTouchPoints === 0) {
            Object.defineProperty(navigator, 'maxTouchPoints', {get: function(){return 5;}});
        }

        try {
            const arcadeData = window.parent.SHARED_ROM_DATA;
            if (arcadeData && arcadeData.romArray) {
                EJS_player = '#game';
                EJS_core = arcadeData.core; 
                EJS_gameName = arcadeData.title;
                EJS_color = '#0064ff';
                EJS_pathtodata = 'https://cdn.jsdelivr.net/gh/EmulatorJS/EmulatorJS@latest/data/';
                EJS_gameUrl = arcadeData.romArray; 
                EJS_startOnLoaded = true;
                EJS_Header = false; 
                EJS_mouse = false;
                EJS_Volume = arcadeData.volume; // Стартовый звук (0 или 1)

                const script = document.createElement('script');
                script.src = "https://cdn.jsdelivr.net/gh/EmulatorJS/EmulatorJS@latest/data/loader.js";
                document.head.appendChild(script);
            }
        } catch(e) {
            console.log("Sandbox wait...");
        }

        // 🔥 СЛУШАЕМ КОМАНДЫ ИЗ INDEX.HTML ДЛЯ ВКЛЮЧЕНИЯ/ВЫКЛЮЧЕНИЯ ЗВУКА НА ЛЕТУ
        window.addEventListener('message', function(event) {
            if (event.data && typeof event.data.volume !== 'undefined') {
                if (typeof EJS_setVolume === 'function') {
                    // Официальный метод EmulatorJS для изменения громкости во время игры
                    EJS_setVolume(event.data.volume); 
                }
            }
        });
    </script>
</body>
</html>
