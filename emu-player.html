<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Retro Arcade Player</title>
    <style>
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%; background: #000; overflow: hidden;
        }
        #game {
            width: 100vw; height: 100vh;
        }
    </style>
</head>
<body>

    <div id="game"></div>

    <script>
        // Эмуляция тач-скрина для принудительного включения джойстика на ПК (для тестов)
        if (!('ontouchstart' in window)) { window.ontouchstart = function(){}; }
        if (!navigator.maxTouchPoints || navigator.maxTouchPoints === 0) {
            Object.defineProperty(navigator, 'maxTouchPoints', {get: function(){return 5;}});
        }

        // Ждем, пока родительское окно передаст нам файл игры
        window.addEventListener('message', function(event) {
            if (event.data && event.data.romArray) {
                const coreType = event.data.core;
                const gameTitle = event.data.title;
                const romUint8Array = event.data.romArray;

                EJS_player = '#game';
                EJS_core = coreType; 
                EJS_gameName = gameTitle;
                EJS_color = '#0064ff';
                EJS_pathtodata = 'https://cdn.emulatorjs.org/stable/data/';
                
                // Передаем массив байт напрямую в эмулятор вместо ссылки!
                EJS_gameUrl = romUint8Array; 
                
                EJS_startOnLoaded = true;
                EJS_Header = false; 
                EJS_mouse = false;

                // Динамически подгружаем лоадер, когда данные уже на месте
                const script = document.createElement('script');
                script.src = "https://cdn.emulatorjs.org/stable/data/loader.js";
                document.head.appendChild(script);
            }
        });
    </script>
</body>
</html>
