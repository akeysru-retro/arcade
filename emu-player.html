<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Retro Arcade Player</title>
    <style>
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%; background: #000; overflow: hidden;
        }
        #game {
            width: 100vw; height: 100vh;
        }
    </style>
</head>
<body>

    <div id="game"></div>

    <script>
        // Имитация тач-скрина для принудительного включения джойстика на ПК
        if (!('ontouchstart' in window)) { window.ontouchstart = function(){}; }
        if (!navigator.maxTouchPoints || navigator.maxTouchPoints === 0) {
            Object.defineProperty(navigator, 'maxTouchPoints', {get: function(){return 5;}});
        }

        // Безопасно забираем подготовленные бинарные данные прямо из родительского окна index.html
        try {
            const arcadeData = window.parent.SHARED_ROM_DATA;

            if (arcadeData && arcadeData.romArray) {
                EJS_player = '#game';
                EJS_core = arcadeData.core; 
                EJS_gameName = arcadeData.title;
                EJS_color = '#0064ff';
                EJS_pathtodata = 'https://cdn.emulatorjs.org/stable/data/';
                EJS_gameUrl = arcadeData.romArray; // Прямой массив байт
                EJS_startOnLoaded = true;
                EJS_Header = false; 
                EJS_mouse = false;
                EJS_Volume = arcadeData.volume;

                // Запускаем лоадер движка
                const script = document.createElement('script');
                script.src = "https://cdn.emulatorjs.org/stable/data/loader.js";
                document.head.appendChild(script);
            } else {
                document.body.innerHTML = "<div style='color:white; padding:20px;'>Ожидание данных игры...</div>";
            }
        } catch(e) {
            alert("Ошибка песочницы: " + e.message);
        }
    </script>
</body>
</html>
